<!DOCTYPE html>
<html>
<head>
  <title>Randal's VPN</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      max-width: 700px;
      margin: 40px auto;
    }

    h1 {
      text-align: center;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .add-btn {
      background: #22c55e;
      color: white;
    }

    .user-card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .username {
      font-size: 18px;
      font-weight: bold;
    }

    .uuid {
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
      margin-top: 5px;
    }

    .buttons {
      margin-top: 10px;
    }

    .copy {
      background: #3b82f6;
      color: white;
    }

    .delete {
      background: #ef4444;
      color: white;
    }

    .qr {
      background: #22c55e;
      color: white;
    }

    .qr-img {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>VPN User Manager</h1>

  <div class="top-bar">
    <input type="text" id="username" placeholder="Enter username">
    <button class="add-btn" onclick="addUser()">Add</button>
  </div>

  <div id="userList"></div>

  <script>
    const API = "http://My IP";

    async function fetchUsers() {
      const res = await fetch(API + "/users");
      const users = await res.json();

      const list = document.getElementById("userList");
      list.innerHTML = "";

      users.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-card";

        div.innerHTML = `
          <div class="username">${user.username}</div>
          <div class="uuid">${user.uuid}</div>
          <div class="buttons">
            <button class="copy">Copy</button>
            <button class="qr">QR</button>
            <button class="delete">Delete</button>
          </div>
          <div class="qr-img"></div>
        `;

        // Copy UUID
        div.querySelector(".copy").onclick = () => {
          navigator.clipboard.writeText(user.uuid);
          alert("UUID copied!");
        };

        // Generate QR
        div.querySelector(".qr").onclick = () => {
          const vmess = {
            v: "2",
            ps: user.username,
            add: "45.76.217.135",
            port: "10086",
            id: user.uuid,
            aid: "0",
            net: "tcp",
            type: "none",
            host: "",
            path: "",
            tls: ""
          };

          const vmessStr = "vmess://" + btoa(JSON.stringify(vmess));

          const qrDiv = div.querySelector(".qr-img");
          qrDiv.innerHTML = `
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(vmessStr)}">
          `;
        };

        // Delete user
        div.querySelector(".delete").onclick = async () => {
          const password = prompt("Enter admin password:");
          if (!password) return;

          const confirmDelete = confirm("Delete this user?");
          if (!confirmDelete) return;

          const res = await fetch(API + "/delete-user/" + user.id, {
            method: "DELETE",
            headers: {
              "admin-password": password
            }
          });

          const data = await res.json();

          if (data.message === "unauthorized") {
            alert("Wrong password");
            return;
          }

          fetchUsers();
        };

        list.appendChild(div);
      });
    }

    async function addUser() {
      const username = document.getElementById("username").value;

      if (!username) {
        alert("Please enter username");
        return;
      }

      const password = prompt("Enter admin password:");
      if (!password) return;

      const res = await fetch(API + "/add-user", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "admin-password": password
        },
        body: JSON.stringify({ username })
      });

      const data = await res.json();

      if (data.message === "unauthorized") {
        alert("Wrong password");
        return;
      }

      document.getElementById("username").value = "";
      fetchUsers();
    }

    fetchUsers();
  </script>

</body>
</html>
